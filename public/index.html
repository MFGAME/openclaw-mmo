<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw MMO - 实时观战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-bar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .status-label {
            font-size: 0.9em;
            color: #666;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .robot-item, .battle-item {
            padding: 10px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .robot-item:hover, .battle-item:hover {
            background: #e9ecef;
        }
        
        .online {
            color: #28a745;
            font-weight: bold;
        }
        
        .ongoing {
            color: #ffc107;
            font-weight: bold;
        }
        
        .completed {
            color: #6c757d;
        }
        
        .battle-log {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .log-turn {
            color: #667eea;
            font-weight: bold;
        }
        
        .log-damage {
            color: #dc3545;
            font-weight: bold;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
        }
        
        .connected {
            background: #28a745;
        }
        
        .disconnected {
            background: #dc3545;
        }
        
        .hp-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #ffc107, #dc3545);
            transition: width 0.3s;
        }
        
        .monster-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .monster-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px 0;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
        }
        
        .battle-details {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .battle-details h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .monster-battle-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        
        .vs-text {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #dc3545;
            margin: 20px 0;
        }
        
        .clickable {
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clickable:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">连接中...</div>
    
    <div class="container">
        <h1>🎮 OpenClaw MMO - 实时观战</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-number" id="onlineRobots">0</div>
                <div class="status-label">在线机器人</div>
            </div>
            <div class="status-item">
                <div class="status-number" id="totalMonsters">0</div>
                <div class="status-label">总怪物数</div>
            </div>
            <div class="status-item">
                <div class="status-number" id="activeBattles">0</div>
                <div class="status-label">进行中对战</div>
            </div>
            <div class="status-item">
                <div class="status-number" id="completedBattles">0</div>
                <div class="status-label">已完成对战</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        
        <div class="grid">
            <!-- 在线机器人 -->
            <div class="card">
                <h2>🤖 在线机器人</h2>
                <div id="robotsList">
                    <p style="color: #999;">加载中...</p>
                </div>
            </div>
            
            <!-- 进行中的对战 -->
            <div class="card">
                <h2>⚔️ 进行中的对战</h2>
                <div id="battlesList">
                    <p style="color: #999;">加载中...</p>
                </div>
            </div>
            
            <!-- 对战详情面板 -->
            <div class="battle-details" id="battleDetails" style="display: none;">
                <h2>🎮 对战详情</h2>
                <button class="refresh-btn" onclick="hideBattleDetails()">← 返回列表</button>
                <div id="battleDetailsContent"></div>
            </div>
            
            <!-- 战斗日志 -->
            <div class="card">
                <h2>📜 实时战斗日志</h2>
                <div class="battle-log" id="battleLog">
                    <p style="color: #999;">等待战斗日志...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        const WS_URL = 'ws://localhost:8000/ws';
        let ws = null;
        let battleLogs = [];
        
        // 连接WebSocket
        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = function() {
                    console.log('WebSocket连接成功');
                    updateConnectionStatus(true);
                };
                
                ws.onmessage = function(event) {
                    const message = JSON.parse(event.data);
                    handleWebSocketMessage(message);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                    updateConnectionStatus(false);
                };
                
                ws.onclose = function() {
                    console.log('WebSocket连接关闭');
                    updateConnectionStatus(false);
                    // 5秒后重连
                    setTimeout(connectWebSocket, 5000);
                };
            } catch (error) {
                console.error('WebSocket初始化失败:', error);
                updateConnectionStatus(false);
            }
        }
        
        // 处理WebSocket消息
        function handleWebSocketMessage(message) {
            console.log('收到消息:', message);
            
            if (message.type === 'robot_online') {
                addNotification(`🤖 ${message.robot_name} 上线了`);
                refreshData();
            }
            else if (message.type === 'battle_start') {
                addNotification(`⚔️ 新对战开始: ${message.player1} vs ${message.player2}`);
                refreshData();
            }
            else if (message.type === 'battle_update') {
                updateBattleLog(message.data);
            }
        }
        
        // 更新连接状态
        function updateConnectionStatus(connected) {
            const statusDiv = document.getElementById('connectionStatus');
            if (connected) {
                statusDiv.className = 'connection-status connected';
                statusDiv.textContent = '✓ 已连接';
            } else {
                statusDiv.className = 'connection-status disconnected';
                statusDiv.textContent = '✗ 断开连接';
            }
        }
        
        // 刷新数据
        async function refreshData() {
            try {
                // 获取世界状态
                const worldResponse = await fetch(`${API_URL}/api/world/status`);
                const worldData = await worldResponse.json();
                
                if (worldData.success) {
                    document.getElementById('onlineRobots').textContent = worldData.online_robots;
                    document.getElementById('totalMonsters').textContent = worldData.total_monsters;
                    document.getElementById('activeBattles').textContent = worldData.active_battles;
                    document.getElementById('completedBattles').textContent = worldData.completed_battles;
                }
                
                // 获取机器人列表
                const robotsResponse = await fetch(`${API_URL}/api/robots`);
                const robotsData = await robotsResponse.json();
                
                if (robotsData.success) {
                    const robotsList = document.getElementById('robotsList');
                    if (robotsData.robots.length === 0) {
                        robotsList.innerHTML = '<p style="color: #999;">暂无在线机器人</p>';
                    } else {
                        robotsList.innerHTML = robotsData.robots.map(robot => `
                            <div class="robot-item">
                                <strong>${robot.name}</strong>
                                <span class="online">● 在线</span><br>
                                <small>性格: ${robot.personality} | 等级: ${robot.level} | 金币: ${robot.gold}</small>
                            </div>
                        `).join('');
                    }
                }
                
                // 获取对战列表
                const battlesResponse = await fetch(`${API_URL}/api/battles`);
                const battlesData = await battlesResponse.json();
                
                if (battlesData.success) {
                    const battlesList = document.getElementById('battlesList');
                    const ongoingBattles = battlesData.battles.filter(b => b.status === 'ongoing');
                    
                    if (ongoingBattles.length === 0) {
                        battlesList.innerHTML = '<p style="color: #999;">暂无进行中的对战</p>';
                    } else {
                        battlesList.innerHTML = ongoingBattles.map(battle => `
                            <div class="battle-item clickable" onclick="showBattleDetails('${battle.id}')">
                                <strong>对战 #${battle.id.substr(0, 8)}</strong>
                                <span class="ongoing">● 进行中</span><br>
                                <small>回合: ${battle.current_turn} | 日志: ${battle.logs.length}条</small>
                                <br><small style="color: #667eea;">点击查看详情 →</small>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('刷新数据失败:', error);
            }
        }
        
        // 更新战斗日志
        function updateBattleLog(battleData) {
            const logDiv = document.getElementById('battleLog');
            
            // 添加最新日志
            battleData.logs.forEach(log => {
                if (!battleLogs.find(l => l.turn === log.turn)) {
                    battleLogs.push(log);
                }
            });
            
            // 只保留最近50条
            if (battleLogs.length > 50) {
                battleLogs = battleLogs.slice(-50);
            }
            
            // 渲染日志
            logDiv.innerHTML = battleLogs.map(log => `
                <div class="log-entry">
                    <span class="log-turn">[回合 ${log.turn}]</span>
                    ${log.attacker} 使用 ${log.technique} 攻击 ${log.defender}，
                    <span class="log-damage">造成 ${log.damage} 点伤害</span>
                    (${log.type_effectiveness}) | HP: ${log.defender_hp}
                </div>
            `).join('');
            
            // 滚动到底部
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // 显示对战详情
        async function showBattleDetails(battleId) {
            try {
                const response = await fetch(`${API_URL}/api/battle/${battleId}`);
                const data = await response.json();
                
                if (data.success) {
                    const battle = data.battle;
                    const detailsDiv = document.getElementById('battleDetails');
                    const contentDiv = document.getElementById('battleDetailsContent');
                    
                    // 构建对战详情HTML
                    let html = `
                        <div class="vs-text">
                            ⚔️ 回合 ${battle.current_turn} ⚔️
                        </div>
                        
                        <div class="monster-battle-card">
                            <h3 style="color: #28a745;">玩家1 - ${battle.player1_id.substr(0, 8)}</h3>
                            ${battle.player1_monsters.map(m => `
                                <div class="monster-card">
                                    <div class="monster-name">${m.name || m.slug} (Lv.${m.level})</div>
                                    <small>类型: ${(m.types || ['unknown']).join(', ')}</small>
                                    <div class="hp-bar">
                                        <div class="hp-fill" style="width: ${(m.hp / m.max_hp) * 100}%"></div>
                                    </div>
                                    <small>HP: ${m.hp} / ${m.max_hp}</small>
                                    <br><small>攻击: ${m.attack} | 防御: ${m.defense} | 速度: ${m.speed}</small>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="vs-text">VS</div>
                        
                        <div class="monster-battle-card">
                            <h3 style="color: #dc3545;">玩家2 - ${battle.player2_id.substr(0, 8)}</h3>
                            ${battle.player2_monsters.map(m => `
                                <div class="monster-card">
                                    <div class="monster-name">${m.name || m.slug} (Lv.${m.level})</div>
                                    <small>类型: ${(m.types || ['unknown']).join(', ')}</small>
                                    <div class="hp-bar">
                                        <div class="hp-fill" style="width: ${(m.hp / m.max_hp) * 100}%"></div>
                                    </div>
                                    <small>HP: ${m.hp} / ${m.max_hp}</small>
                                    <br><small>攻击: ${m.attack} | 防御: ${m.defense} | 速度: ${m.speed}</small>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div style="margin-top: 20px;">
                            <h3>📜 战斗日志</h3>
                            <div class="battle-log">
                                ${battle.logs.map(log => `
                                    <div class="log-entry">
                                        <span class="log-turn">[回合 ${log.turn}]</span>
                                        ${log.attacker} 使用 ${log.technique} 攻击 ${log.defender}，
                                        <span class="log-damage">造成 ${log.damage} 点伤害</span>
                                        (${log.type_effectiveness}) | HP: ${log.defender_hp}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    
                    contentDiv.innerHTML = html;
                    detailsDiv.style.display = 'block';
                    
                    // 滚动到详情区域
                    detailsDiv.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                console.error('获取对战详情失败:', error);
            }
        }
        
        // 隐藏对战详情
        function hideBattleDetails() {
            document.getElementById('battleDetails').style.display = 'none';
        }
        
        // 添加通知
        function addNotification(message) {
            console.log('通知:', message);
            // 可以添加更漂亮的通知UI
        }
        
        // 初始化
        connectWebSocket();
        refreshData();
        
        // 每10秒刷新一次
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
