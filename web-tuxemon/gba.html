<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw MMO - Tuxemon Web (GBA Edition)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        /* GBA外壳 */
        .gba {
            width: 900px;
            height: 900px;
            background: linear-gradient(145deg, #7a2d8c, #5a1d6c);
            border-radius: 30px;
            padding: 40px 50px 50px 50px;
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.6),
                inset 0 3px 5px rgba(255,255,255,0.2),
                inset 0 -3px 5px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* GBA品牌 */
        .gba-brand {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .gba-logo {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }
        
        .gba-subtitle {
            font-size: 12px;
            color: #e0b0ff;
            margin-top: 5px;
            letter-spacing: 3px;
        }
        
        /* 屏幕区域 */
        .screen-container {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 
                inset 0 5px 15px rgba(0,0,0,0.8),
                0 3px 8px rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        #game-screen {
            width: 720px;
            height: 480px;
            background: #000;
            border: 3px solid #333;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 控制区域 */
        .controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        /* 左侧：方向键 */
        .dpad-container {
            position: relative;
            width: 150px;
            height: 150px;
        }
        
        .dpad {
            position: absolute;
            width: 50px;
            height: 150px;
            background: #2a2a3e;
            left: 50px;
            top: 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .dpad::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 50px;
            background: #2a2a3e;
            left: -50px;
            top: 50px;
            border-radius: 10px;
        }
        
        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #3a3a4e;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
            z-index: 10;
        }
        
        .dpad-btn:active {
            transform: scale(0.95);
        }
        
        .dpad-up { left: 50px; top: 0; }
        .dpad-down { left: 50px; top: 100px; }
        .dpad-left { left: 0; top: 50px; }
        .dpad-right { left: 100px; top: 50px; }
        
        /* 中间：功能按钮 */
        .center-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .select-start {
            display: flex;
            gap: 30px;
        }
        
        .small-btn-container {
            text-align: center;
        }
        
        .small-btn {
            width: 60px;
            height: 15px;
            background: #4a4a5e;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }
        
        .small-btn:active {
            transform: translateY(2px);
        }
        
        .btn-label {
            font-size: 10px;
            color: #e0b0ff;
            margin-top: 5px;
            letter-spacing: 2px;
        }
        
        /* 右侧：ABLR按钮 */
        .action-buttons {
            position: relative;
            width: 180px;
            height: 180px;
        }
        
        .action-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .btn-a {
            background: #e74c3c;
            right: 20px;
            top: 20px;
        }
        
        .btn-b {
            background: #e67e22;
            right: 90px;
            top: 90px;
        }
        
        .btn-l {
            background: #3498db;
            left: 0;
            top: -30px;
            width: 60px;
            height: 40px;
            border-radius: 20px;
            font-size: 16px;
        }
        
        .btn-r {
            background: #3498db;
            right: 0;
            top: -30px;
            width: 60px;
            height: 40px;
            border-radius: 20px;
            font-size: 16px;
        }
        
        /* 标签 */
        .button-label {
            position: absolute;
            font-size: 12px;
            color: #e0b0ff;
            letter-spacing: 2px;
        }
        
        .label-a { right: 40px; top: 95px; }
        .label-b { right: 110px; top: 165px; }
        
        /* 电源指示 */
        .power-led {
            position: absolute;
            bottom: 20px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .led {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .led-text {
            color: #e0b0ff;
            font-size: 10px;
            letter-spacing: 1px;
        }
        
        /* 游戏提示 */
        .game-tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="gba">
        <div class="gba-brand">
            <div class="gba-logo">GAME BOY ADVANCE</div>
            <div class="gba-subtitle">OPENCLAW MMO - TUXEMON EDITION</div>
        </div>
        
        <div class="screen-container">
            <canvas id="game-screen"></canvas>
        </div>
        
        <div class="controls">
            <div class="dpad-container">
                <div class="dpad"></div>
                <div class="dpad-btn dpad-up" id="btn-up"></div>
                <div class="dpad-btn dpad-down" id="btn-down"></div>
                <div class="dpad-btn dpad-left" id="btn-left"></div>
                <div class="dpad-btn dpad-right" id="btn-right"></div>
            </div>
            
            <div class="center-buttons">
                <div class="select-start">
                    <div class="small-btn-container">
                        <div class="small-btn" id="btn-select"></div>
                        <div class="btn-label">SELECT</div>
                    </div>
                    <div class="small-btn-container">
                        <div class="small-btn" id="btn-start"></div>
                        <div class="btn-label">START</div>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <div class="action-btn btn-l" id="btn-l">L</div>
                <div class="action-btn btn-r" id="btn-r">R</div>
                <div class="action-btn btn-a" id="btn-a">A</div>
                <div class="action-btn btn-b" id="btn-b">B</div>
                <div class="button-label label-a">A</div>
                <div class="button-label label-b">B</div>
            </div>
        </div>
        
        <div class="power-led">
            <div class="led"></div>
            <div class="led-text">POWER</div>
        </div>
    </div>
    
    <div class="game-tip">
        🎮 Keyboard: Arrow Keys + Z(A) / X(B) / A(L) / S(R) / Enter(Start) | Loading Tuxemon resources...
    </div>
    
    <script src="game_gba.js"></script>
</body>
</html>
