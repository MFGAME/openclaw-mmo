<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw MMO - 网页版宝可梦</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    #game-container {
      position: relative;
      background: #0f0f23;
      border: 3px solid #4a9eff;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
    }
    
    #game-canvas {
      display: block;
    }
    
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 35, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    #loading.hidden {
      display: none;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #loading-text {
      margin-top: 20px;
      font-size: 16px;
      color: #4a9eff;
    }
    
    .controls {
      margin-top: 20px;
      padding: 15px 25px;
      background: rgba(74, 158, 255, 0.1);
      border-radius: 8px;
      font-size: 14px;
      color: #aaa;
    }
    
    .controls h3 {
      color: #4a9eff;
      margin-bottom: 10px;
    }
    
    .controls p {
      margin: 5px 0;
    }
    
    .key {
      display: inline-block;
      padding: 2px 8px;
      background: #333;
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="loading">
      <div class="loader"></div>
      <div id="loading-text">正在加载游戏资源...</div>
    </div>
  </div>
  
  <div class="controls">
    <h3>🎮 操作说明</h3>
    <p><span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 移动</p>
    <p><span class="key">Z</span> 确认 / 交互</p>
    <p><span class="key">X</span> 取消 / 菜单</p>
    <p><span class="key">Shift</span> 跑步</p>
    <p><span class="key">Space</span> 跳跃</p>
  </div>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
