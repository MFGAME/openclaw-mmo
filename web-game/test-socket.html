<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO 连接测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .status.connected {
            background: #28a745;
        }
        .status.disconnected {
            background: #dc3545;
        }
        .status.connecting {
            background: #ffc107;
            color: #000;
        }
        .log {
            background: #0f0f23;
            padding: 15px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #4a9eff;
        }
        button {
            padding: 10px 20px;
            background: #4a9eff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <h1>Socket.IO 连接测试</h1>
    <div id="status" class="status disconnected">未连接</div>
    <div>
        <button onclick="testConnection()">测试连接</button>
        <button onclick="sendMove()">发送移动</button>
        <button onclick="clearLog()">清空日志</button>
    </div>
    <div class="log" id="log"></div>

    <script type="module">
        import { io } from 'https://cdn.socket.io/4.8.3/socket.io.esm.min.js';

        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[${type}]`, message);
        }

        // 连接到 Socket.IO 服务器
        const socket = io('http://localhost:3000');

        socket.on('connect', () => {
            statusEl.className = 'status connected';
            statusEl.textContent = '已连接 (ID: ' + socket.id + ')';
            addLog(`Socket.IO 已连接，ID: ${socket.id}`, 'success');

            // 发送玩家加入消息
            socket.emit('player_join', {
                name: '测试玩家',
                x: 400,
                y: 300,
                direction: 'down',
                level: 1
            });
        });

        socket.on('disconnect', () => {
            statusEl.className = 'status disconnected';
            statusEl.textContent = '已断开';
            addLog('Socket.IO 已断开', 'error');
        });

        socket.on('connect_error', (error) => {
            statusEl.className = 'status disconnected';
            statusEl.textContent = '连接错误';
            addLog(`连接错误: ${error.message}`, 'error');
        });

        socket.on('players_update', (players) => {
            addLog(`收到玩家列表更新: ${players.length} 个玩家`, 'info');
            console.log('Players:', players);
        });

        socket.on('player_joined', (player) => {
            addLog(`玩家加入: ${player.name} (${player.id})`, 'success');
        });

        socket.on('player_left', (data) => {
            addLog(`玩家离开: ${data.name} (${data.id})`, 'info');
        });

        socket.on('player_move', (data) => {
            addLog(`玩家移动: ${data.id} -> (${data.x}, ${data.y})`, 'info');
        });

        window.testConnection = () => {
            addLog('测试连接...', 'info');
            if (socket.connected) {
                addLog('连接正常！', 'success');
            } else {
                addLog('未连接！', 'error');
            }
        };

        window.sendMove = () => {
            const x = Math.floor(Math.random() * 800);
            const y = Math.floor(Math.random() * 600);
            const directions = ['up', 'down', 'left', 'right'];
            const direction = directions[Math.floor(Math.random() * directions.length)];

            socket.emit('player_move', { x, y, direction });
            addLog(`发送移动: (${x}, ${y}) ${direction}`, 'info');
        };

        window.clearLog = () => {
            logEl.innerHTML = '';
        };

        addLog('Socket.IO 测试页面已加载', 'info');
    </script>
</body>
</html>
