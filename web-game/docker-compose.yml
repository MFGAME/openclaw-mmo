# OpenClaw MMO - Docker Compose 配置
# 用于本地开发和生产部署

version: '3.8'

services:
  # ==================== Web 服务器 ====================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-web
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets:/usr/share/nginx/html/assets:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== WebSocket 服务器 ====================
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: openclaw-websocket
    ports:
      - "${WEBSOCKET_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - WEBSOCKET_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./logs/websocket:/var/log/openclaw
    restart: unless-stopped
    networks:
      - openclaw-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-openclaw123}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== PostgreSQL 数据库（可选）====================
  postgres:
    image: postgres:15-alpine
    container_name: openclaw-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-openclaw}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openclaw123}
      - POSTGRES_DB=${POSTGRES_DB:-openclaw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 监控 - Prometheus（可选）====================
  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
    restart: unless-stopped
    networks:
      - openclaw-network

  # ==================== 监控 - Grafana（可选）====================
  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-openclaw123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - openclaw-network
    depends_on:
      - prometheus

# ==================== 网络配置 ====================
networks:
  openclaw-network:
    driver: bridge

# ==================== 数据卷配置 ====================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
